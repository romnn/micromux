# yaml-language-server: $schema=https://github.com/romnn/micromux/raw/main/micromux.schema.json
#
# Reproducible demo stack used to generate the README screenshots (see crates/micromux-screenshot).
#
# Every service is deterministic and self-contained: each prints a fixed, colorized banner and then
# sleeps (or exits), and every healthcheck resolves on its first probe with a long interval, so the
# UI settles into a stable frame within a second. The set is arranged so one capture shows every
# lifecycle state at once — healthy, running, completed (exited), unhealthy, and pending.
version: "1"
services:
  api:
    command:
      - sh
      - -c
      - |
        printf '\033[1;36m[api]\033[0m starting micromux demo api \033[2mv1.4.2\033[0m\n'
        printf '\033[2m→\033[0m connecting to postgres://localhost:5432 \033[32m✓\033[0m\n'
        printf '\033[2m→\033[0m connecting to redis://localhost:6379 \033[32m✓\033[0m\n'
        printf '\033[32m●\033[0m \033[1mlistening on http://0.0.0.0:8080\033[0m\n'
        printf '\033[90m12:00:01\033[0m \033[32mGET   \033[0m /health        \033[32m200\033[0m   1ms\n'
        printf '\033[90m12:00:01\033[0m \033[32mGET   \033[0m /api/users     \033[32m200\033[0m  12ms\n'
        printf '\033[90m12:00:02\033[0m \033[36mPOST  \033[0m /api/orders    \033[32m201\033[0m  34ms\n'
        printf '\033[90m12:00:02\033[0m \033[32mGET   \033[0m /api/orders/9  \033[33m404\033[0m   2ms\n'
        printf '\033[90m12:00:03\033[0m \033[32mGET   \033[0m /api/products  \033[32m200\033[0m   8ms\n'
        printf '\033[90m12:00:03\033[0m \033[33mPUT   \033[0m /api/cart/42   \033[32m200\033[0m  17ms\n'
        printf '\033[90m12:00:04\033[0m \033[31mDELETE\033[0m /api/cart/42   \033[32m204\033[0m   9ms\n'
        printf '\033[90m12:00:04\033[0m \033[36mPOST  \033[0m /api/login     \033[32m200\033[0m  21ms\n'
        sleep 1000000
    ports:
      - 8080
    depends_on:
      - name: postgres
        condition: healthy
      - name: redis
        condition: healthy
    healthcheck:
      test: ["CMD-SHELL", "echo 'GET /health -> 200 OK in 1ms'"]
      start_delay: "100ms"
      interval: "1h"
      timeout: "2s"

  web:
    command:
      - sh
      - -c
      - |
        printf '\033[1;35mVITE\033[0m \033[2mv5.4.0  ready in 312 ms\033[0m\n'
        printf '\033[32m->\033[0m  \033[1mLocal\033[0m:   http://localhost:3000/\n'
        printf '\033[32m->\033[0m  \033[1mNetwork\033[0m: http://192.168.1.20:3000/\n'
        printf '\033[90m12:00:03\033[0m \033[36m[vite]\033[0m hmr update /src/App.tsx\n'
        sleep 1000000
    ports:
      - 3000

  worker:
    command:
      - sh
      - -c
      - |
        printf '\033[1;34m[worker]\033[0m queue consumer started \033[2m(concurrency=4)\033[0m\n'
        printf '\033[90m12:00:02\033[0m processed job \033[36m#1042\033[0m \033[32mok\033[0m\n'
        printf '\033[90m12:00:03\033[0m processed job \033[36m#1043\033[0m \033[32mok\033[0m\n'
        sleep 1000000
    depends_on:
      - name: api
        condition: healthy

  postgres:
    command:
      - sh
      - -c
      - |
        printf '\033[1mPostgreSQL\033[0m 16.2 \033[2mstarting\033[0m\n'
        printf '\033[90mLOG:\033[0m  database system is ready to accept connections\n'
        sleep 1000000
    ports:
      - 5432
    healthcheck:
      test: ["CMD-SHELL", "echo 'accepting connections'"]
      start_delay: "100ms"
      interval: "1h"
      timeout: "2s"

  redis:
    command:
      - sh
      - -c
      - |
        printf '\033[35mredis\033[0m 7.2.4 \033[2mstandalone mode\033[0m\n'
        printf '\033[90m*\033[0m Ready to accept connections tcp\n'
        sleep 1000000
    ports:
      - 6379
    healthcheck:
      test: ["CMD-SHELL", "echo 'PONG'"]
      start_delay: "100ms"
      interval: "1h"
      timeout: "2s"

  migrate:
    command:
      - sh
      - -c
      - |
        printf '\033[1;32m[migrate]\033[0m applying database migrations\n'
        printf '\033[32m*\033[0m 0001_init.sql\n'
        printf '\033[32m*\033[0m 0002_add_orders.sql\n'
        printf '\033[32m*\033[0m schema up to date \033[2m(2 applied)\033[0m\n'
    restart: "no"

  payments:
    command:
      - sh
      - -c
      - |
        printf '\033[1;33m[payments]\033[0m booting payment gateway \033[2mv2.1\033[0m\n'
        printf '\033[2m→\033[0m loading merchant config \033[2m(3 accounts)\033[0m\n'
        printf '\033[2m→\033[0m dialing acquirer at 127.0.0.1:7070\n'
        printf '\033[31m✗\033[0m connect: connection refused\n'
        printf '\033[2m→\033[0m retry 1/5 in 5s\n'
        printf '\033[2m→\033[0m retry 2/5 in 5s\n'
        printf '\033[33m!\033[0m acquirer unreachable, marking degraded\n'
        sleep 1000000
    ports:
      - 7070
    healthcheck:
      test: ["CMD-SHELL", "echo 'connect: connection refused'; exit 1"]
      start_delay: "100ms"
      interval: "1h"
      timeout: "2s"
      retries: 0

  checkout:
    command:
      - sh
      - -c
      - |
        printf '[checkout] waiting for payments to become healthy\n'
        sleep 1000000
    depends_on:
      - name: payments
        condition: healthy

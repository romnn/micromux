# unwrap/expect/panic are denied in production code (workspace lints), but
# they are the idiomatic failure mode inside tests — a failing test SHOULD
# panic. These flags scope the denies to non-test code.
allow-unwrap-in-tests = true
allow-expect-in-tests = true
allow-panic-in-tests = true
allow-indexing-slicing-in-tests = true

# Tests must assert equality with `similar_asserts::assert_eq`, which renders a
# readable diff on failure instead of dumping two large opaque values. Import
# the alias from the test-util prelude (`use test_util::prelude::sim_assert_eq;`)
# and call `sim_assert_eq!`. This bans only the std macro; `similar_asserts`'
# own macro (and the `sim_assert_eq` alias) is unaffected.
#
# Note: similar-asserts ships no `assert_ne`, so `std::assert_ne!` is kept as-is.
disallowed-macros = [
  { path = "std::assert_eq", reason = "use similar_asserts::assert_eq via the test-util prelude alias `sim_assert_eq` (import `use test_util::prelude::sim_assert_eq;`)" },
  { path = "std::dbg", reason = "remove before commit" },
]

pass-by-value-size-limit = 64
stack-size-threshold = 131072
enum-variant-size-threshold = 128
too-large-for-stack = 4096
avoid-breaking-exported-api = false
accept-comment-above-attributes = true
